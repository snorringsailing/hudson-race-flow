<!DOCTYPE html>
<html>
<head>
  <title>Hudson Race Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }

    .nav {
      background:#111;
      color:white;
      padding:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .nav a {
      color:white;
      text-decoration:none;
      margin-left:10px;
    }

    .container { padding:15px; }

    input, button {
      width:100%;
      padding:12px;
      font-size:18px;
      margin:6px 0;
    }

    button {
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
    }

    .header {
      padding:12px;
      border-radius:8px;
      background:#007bff;
      color:white;
      text-align:center;
      margin-bottom:10px;
    }

    .segment {
      background:white;
      padding:12px;
      margin:8px 0;
      border-radius:8px;
      box-shadow:0 1px 4px rgba(0,0,0,0.1);
    }

    .tag {
      font-weight:bold;
      margin-top:5px;
    }

    .trend {
      margin-top:6px;
      font-size:13px;
      color:#555;
    }
  </style>
</head>

<body>

<div class="nav">
  <div><b>Hudson Race Flow</b></div>
  <div>
    <a href="/hudson-race-flow/index.html">Model</a>
    <a href="/hudson-race-flow/map.html">Map</a>
  </div>
</div>

<div class="container">

<input type="number" id="windDir" placeholder="Wind Direction (deg)">
<input type="number" id="windSpeed" placeholder="Wind Speed (kts)">

<button onclick="runModel()">Run Model</button>

<a href="/hudson-race-flow/map.html">
  <button style="background:#28a745;">Open Map View</button>
</a>

<div id="output"></div>

</div>

<script>

// ---------- COMPASS ----------
function getCompass(dir) {
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(dir / 22.5) % 16];
}

// ---------- WIND ----------
async function fetchWind() {
  try {
    const res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true"
    );
    const data = await res.json();

    return {
      dir: data.current_weather.winddirection,
      spd: data.current_weather.windspeed * 0.54
    };

  } catch {
    return { dir: 220, spd: 10 };
  }
}

// ---------- CURRENT ----------
async function getCurrentFromNOAA() {
  try {
    const url = "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=currents_predictions&station=8518750&units=english&time_zone=gmt&format=json";
    const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

    const res = await fetch(proxy);
    const data = await res.json();

    if (!data.data || !data.data[0]) throw "bad";

    const val = parseFloat(data.data[0].v);
    if (isNaN(val)) throw "bad";

    return val;

  } catch {
    return Math.sin(Date.now()/10000000) * 1.5;
  }
}

// ---------- SEGMENTS ----------
const segments = [
  "Verrazzano",
  "Bay Ridge",
  "Red Hook",
  "Governors Island",
  "Battery",
  "Pier 25",
  "Pier 40",
  "Midtown",
  "Stevens",
  "GW Bridge"
];

// ---------- MAIN ----------
async function runModel() {

  try {

    let windDirInput = document.getElementById("windDir").value;
    let windSpeedInput = document.getElementById("windSpeed").value;

    let wind = (windDirInput && windSpeedInput)
      ? { dir: parseFloat(windDirInput), spd: parseFloat(windSpeedInput) }
      : await fetchWind();

    const baseCurrent = await getCurrentFromNOAA();

    const hours = [0,1,2,3,4];

    let html = `
      <div class="header">
        ${getCompass(wind.dir)} (${wind.dir.toFixed(0)}°) @ ${wind.spd.toFixed(1)} kts
      </div>
    `;

    segments.forEach((name, i) => {

      let timeline = [];

      hours.forEach(h => {
        timeline.push(baseCurrent * Math.cos(h * 0.8));
      });

      const current = timeline[0];
      const ebb = current < 0;

      let call = ebb ? "Favor NJ" : "Favor Manhattan";

      if (wind.spd < 7) {
        if (wind.dir > 45 && wind.dir < 135) call = "Favor Manhattan (wind)";
        if (wind.dir > 225 && wind.dir < 315) call = "Favor NJ (wind)";
      }

      // TURN detection
      let turn = "";
      for (let h=1; h<hours.length; h++) {
        if (timeline[h-1]*timeline[h] < 0) {
          turn = `TURN ~ +${h}h`;
        }
      }

      // TREND
      let trend = hours.map((h, idx) =>
        `+${h}h: ${timeline[idx].toFixed(1)}`
      ).join(" | ");

      html += `
        <div class="segment">
          <b>${name}</b><br>

          Current: ${current.toFixed(1)} kts (${ebb ? "Ebb" : "Flood"})<br>
          <div class="tag">${call}</div>

          <div class="trend">
            ${turn ? `<b>${turn}</b><br>` : ""}
            ${trend}
          </div>
        </div>
      `;
    });

    document.getElementById("output").innerHTML = html;

  } catch (err) {

    console.log("ERROR:", err);

    document.getElementById("output").innerHTML = `
      <div style="color:red;">
        Error loading data — refresh page
      </div>
    `;
  }
}

// run on load
runModel();

</script>

</body>
</html>
