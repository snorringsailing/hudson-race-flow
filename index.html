<!DOCTYPE html>
<html>
<head>
  <title>Hudson Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; }
    #map { height:100vh; }
    button {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1000;
      padding:10px;
    }
  </style>
</head>

<body>

<a href="index.html"><button>Back</button></a>
<div id="map"></div>

<script>

const map = L.map('map').setView([40.70, -74.02], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

async function fetchWind() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true");
    const data = await res.json();
    return {
      dir: data.current_weather.winddirection,
      spd: data.current_weather.windspeed * 0.54
    };
  } catch {
    return { dir: 220, spd: 10 };
  }
}

async function getCurrentFromNOAA() {
  try {
    const url = "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=currents_predictions&station=8518750&units=english&time_zone=gmt&format=json";
    const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

    const res = await fetch(proxy);
    const data = await res.json();

    return parseFloat(data.data[0].v);

  } catch {
    return Math.sin(Date.now()/10000000)*1.5;
  }
}

function windFavor(dir) {
  if (dir > 45 && dir < 135) return "MAN";
  if (dir > 225 && dir < 315) return "NJ";
  return "NEUTRAL";
}

const segments = [
  { name: "Verrazzano", coords: [40.606, -74.045] },
  { name: "Bay Ridge", coords: [40.620, -74.030] },
  { name: "Red Hook", coords: [40.660, -74.015] },
  { name: "Governors Island", coords: [40.695, -74.020] },
  { name: "Battery", coords: [40.705, -74.015] },
  { name: "Pier 25", coords: [40.720, -74.010] },
  { name: "Pier 40", coords: [40.730, -74.010] },
  { name: "Midtown", coords: [40.760, -74.000] },
  { name: "Stevens", coords: [40.745, -74.025] },
  { name: "GW Bridge", coords: [40.850, -73.960] }
];

async function drawMap() {

  const wind = await fetchWind();
  const baseCurrent = await getCurrentFromNOAA();

  segments.forEach((seg, i) => {

    const current = baseCurrent * (1 + (i - segments.length/2)*0.05);
    const ebb = current < 0;

    let side = ebb ? "NJ" : "MAN";

    if (wind.spd < 7) {
      side = windFavor(wind.dir);
    }

    const color = side === "NJ" ? "blue" : side === "MAN" ? "red" : "gray";
    const arrow = ebb ? "↓" : "↑";

    const icon = L.divIcon({
      html: `<div style="color:${color};font-weight:bold;text-align:center">${arrow}<br>${side}</div>`
    });

    L.marker(seg.coords, { icon })
      .addTo(map)
      .bindPopup(`
        <b>${seg.name}</b><br>
        Wind: ${wind.dir.toFixed(0)}° @ ${wind.spd.toFixed(1)} kts<br>
        Current: ${current.toFixed(1)} kts (${ebb ? "Ebb" : "Flood"})<br>
        <b>Best Side: ${side}</b>
      `);

  });
}

drawMap();

</script>

</body>
</html>
