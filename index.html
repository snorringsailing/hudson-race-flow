<!DOCTYPE html>
<html>
<head>
  <title>Hudson Race Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; padding: 15px; background: #f5f5f5; }
    h2 { text-align: center; }

    input, button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      margin: 6px 0;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .header {
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      color:white;
      text-align:center;
      background:#007bff;
    }

    .segment {
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background: #28a745;
      color: white;
    }

    .south { background:#17a2b8; }
  </style>
</head>

<body>

<h2>Hudson Race Flow</h2>

<input type="date" id="date">
<input type="time" id="time">

<input type="number" id="windDir" placeholder="Wind Direction (degrees)">
<input type="number" id="windSpeed" placeholder="Wind Speed (knots)">

<button onclick="runModel()">Run 4 Hour Model</button>

<div id="output"></div>

<script>

// ---------- DEFAULT DATE/TIME ----------
window.onload = function() {
  const now = new Date();
  document.getElementById("date").value = now.toISOString().split("T")[0];
  document.getElementById("time").value = now.toTimeString().slice(0,5);
  runModel();
};

// ---------- SEGMENTS ----------
const segments = [
  { name: "Battery to Governors Island", zone: "south", landmark: "Harbor entrance" },
  { name: "Governors to Red Hook", zone: "south", landmark: "Buttermilk Channel" },
  { name: "Red Hook to Bay Ridge", zone: "south", landmark: "Upper Bay east side" },
  { name: "Bay Ridge to Verrazzano Bridge", zone: "south", landmark: "Narrows" },
  { name: "North Cove to Pier 25", zone: "hudson", landmark: "Battery / Holland Tunnel" },
  { name: "Pier 25 to Pier 40", zone: "hudson", landmark: "Tribeca" },
  { name: "Pier 40 to Pier 66", zone: "hudson", landmark: "Little Island" },
  { name: "Pier 66 to Pier 79", zone: "hudson", landmark: "Midtown" },
  { name: "Pier 79 to GW Bridge", zone: "hudson", landmark: "Stevens Tech" }
];

// ---------- CURRENT MODEL ----------
function getCurrent(i, t) {
  return Math.sin(i * 0.8 + t * 0.5) * 2;
}

// ---------- SIMPLE WIND (OPEN-METEO) ----------
async function fetchWind() {
  try {
    const res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true"
    );

    if (!res.ok) throw "HTTP error";

    const data = await res.json();

    console.log("OPEN METEO:", data);

    const dir = data.current_weather.winddirection;
    const spd = data.current_weather.windspeed * 0.54; // km/h → knots

    if (!dir || !spd) throw "Bad values";

    return {
      dir: dir,
      spd: spd,
      label: "LIVE WIND"
    };

  } catch (err) {
    console.log("Wind error:", err);

    return {
      dir: 220,
      spd: 12,
      label: "WIND DEFAULT"
    };
  }
}

// ---------- MAIN ----------
async function runModel() {

  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  let windDirInput = document.getElementById("windDir").value;
  let windSpeedInput = document.getElementById("windSpeed").value;

  windDirInput = windDirInput ? parseFloat(windDirInput) : null;
  windSpeedInput = windSpeedInput ? parseFloat(windSpeedInput) : null;

  let wind;

  if (windDirInput && windSpeedInput) {
    wind = { dir: windDirInput, spd: windSpeedInput, label: "MANUAL OVERRIDE" };
  } else {
    wind = await fetchWind();
  }

  let html = `
    <div class="header">
      ${wind.label}<br>
      ${date} ${time}<br>
      ${wind.dir.toFixed(0)} deg @ ${wind.spd.toFixed(1)} kts
    </div>
  `;

  segments.forEach((seg, i) => {

    const now = getCurrent(i, 0);
    const plus2 = getCurrent(i, 2);
    const ebb = now < 0;

    let side;
    let tactical;

    // ---------- HUDSON ----------
    if (seg.zone === "hudson") {

      if (ebb) {
        side = "NJ favored";
        tactical = "STAY WEST – ride ebb relief";
      } else {
        side = "Manhattan favored";
        tactical = "STAY EAST – flood relief";
      }

      // crossing logic
      if (Math.abs(now) < 0.5) {
        tactical = "CROSS NOW – weak current";
      }

      if (plus2 * now < 0) {
        tactical = "WAIT – current turning soon";
      }
    }

    // ---------- HARBOR ----------
    else {

      if (ebb) {
        side = "Mid-channel flow";
        tactical = "AVOID SHALLOWS – strongest ebb mid-channel";
      } else {
        side = "Edges / eddies";
        tactical = "WORK SHORELINES – flood back-eddies";
      }

      if (Math.abs(now) < 0.5) {
        tactical = "DIRECT ROUTE – minimal current";
      }
    }

    // ---------- WIND EFFECT ----------
    if (wind.dir > 40 && wind.dir < 120) {
      tactical += " | EAST WIND: favor Manhattan pressure";
    }

    if (wind.dir > 190 && wind.dir < 260) {
      tactical += " | SW WIND: favor NJ pressure";
    }

    if (wind.spd < 7) {
      tactical += " | LIGHT AIR: prioritize pressure over current";
    }

    html += `
      <div class="segment ${seg.zone === 'south' ? 'south' : ''}">
        <strong>${seg.name}</strong><br>
        ${seg.landmark}<br>

        Current: ${now.toFixed(1)} kts ${ebb ? "Ebb" : "Flood"}<br>

        <b>${side}</b><br>
        <b>${tactical}</b>
      </div>
    `;
  });

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
