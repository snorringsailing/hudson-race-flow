<!DOCTYPE html>
<html>
<head>
  <title>Hudson Race Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; padding: 15px; background: #f5f5f5; }
    h2 { text-align: center; }

    input, button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      margin: 6px 0;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .header {
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      color:white;
      text-align:center;
      background:#007bff;
    }

    .segment {
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background: #28a745;
      color: white;
    }
  </style>
</head>

<body>

<h2>Hudson Race Flow</h2>

<input type="date" id="date">
<input type="time" id="time">

<input type="number" id="windDir" placeholder="Wind Direction (deg)">
<input type="number" id="windSpeed" placeholder="Wind Speed (knots)">

<button onclick="runModel()">Run Model</button>

<a href="map.html">
  <button>Open Map View</button>
</a>

<div id="output"></div>

<script>

window.onload = function() {
  const now = new Date();
  document.getElementById("date").value = now.toISOString().split("T")[0];
  document.getElementById("time").value = now.toTimeString().slice(0,5);
  runModel();
};

const segments = [
  "Battery",
  "Pier 25",
  "Pier 40",
  "Little Island",
  "Midtown",
  "Stevens",
  "GW Bridge"
];

function getCurrent(i) {
  return Math.sin(i * 0.8) * 2;
}

async function fetchWind() {
  try {
    const res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true"
    );

    const data = await res.json();

    return {
      dir: data.current_weather.winddirection,
      spd: data.current_weather.windspeed * 0.54
    };

  } catch {
    return { dir: 220, spd: 12 };
  }
}
function getCompass(dir) {
  const directions = [
    "N","NNE","NE","ENE",
    "E","ESE","SE","SSE",
    "S","SSW","SW","WSW",
    "W","WNW","NW","NNW"
  ];

  const index = Math.round(dir / 22.5) % 16;
  return directions[index];
}
async function runModel() {

  let windDirInput = document.getElementById("windDir").value;
  let windSpeedInput = document.getElementById("windSpeed").value;

  windDirInput = windDirInput ? parseFloat(windDirInput) : null;
  windSpeedInput = windSpeedInput ? parseFloat(windSpeedInput) : null;

  let wind = (windDirInput && windSpeedInput)
    ? { dir: windDirInput, spd: windSpeedInput }
    : await fetchWind();

  let html = `
    <div class="header">
      ${getCompass(wind.dir)} (${wind.dir.toFixed(0)}°) @ ${wind.spd.toFixed(1)} kts
    </div>
  `;

  segments.forEach((name, i) => {

    const current = getCurrent(i);
    const ebb = current < 0;

    let call = ebb ? "Stay NJ" : "Stay Manhattan";

    if (Math.abs(current) < 0.5) call = "Cross now";

    html += `
      <div class="segment">
        <b>${name}</b><br>
        Current: ${current.toFixed(1)} kts<br>
        <b>${call}</b>
      </div>
    `;
  });

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
