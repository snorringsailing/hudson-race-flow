<!DOCTYPE html>
<html>
<head>
  <title>Hudson Race Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; padding: 15px; background: #f5f5f5; }
    h2 { text-align: center; }

    input, button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      margin: 6px 0;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .header {
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      color:white;
      text-align:center;
      background:#007bff;
    }

    .segment {
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background: #28a745;
      color: white;
    }

    .south { background:#17a2b8; }

    /* MAP */
    .mapRow { margin: 8px 0; font-size: 14px; }

    .river {
      display: flex;
      height: 18px;
      border-radius: 6px;
      overflow: hidden;
      background: #ddd;
    }

    .nj { background: #007bff; }
    .ny { background: #ff4136; }

    .labelRow {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>Hudson Race Flow</h2>

<input type="date" id="date">
<input type="time" id="time">

<input type="number" id="windDir" placeholder="Wind Direction (deg)">
<input type="number" id="windSpeed" placeholder="Wind Speed (knots)">

<button onclick="runModel()">Run Model</button>

<div id="map"></div>
<div id="output"></div>

<script>

// ---------- DEFAULT DATE/TIME ----------
window.onload = function() {
  const now = new Date();
  document.getElementById("date").value = now.toISOString().split("T")[0];
  document.getElementById("time").value = now.toTimeString().slice(0,5);
  runModel();
};

// ---------- SEGMENTS ----------
const segments = [
  { name: "Battery → Governors", zone: "south" },
  { name: "Governors → Red Hook", zone: "south" },
  { name: "Red Hook → Bay Ridge", zone: "south" },
  { name: "Bay Ridge → Verrazzano", zone: "south" },
  { name: "North Cove → Pier 25", zone: "hudson" },
  { name: "Pier 25 → Pier 40", zone: "hudson" },
  { name: "Pier 40 → Pier 66", zone: "hudson" },
  { name: "Pier 66 → Pier 79", zone: "hudson" },
  { name: "Pier 79 → GW Bridge", zone: "hudson" }
];

// ---------- CURRENT MODEL ----------
function getCurrent(i, t) {
  return Math.sin(i * 0.8 + t * 0.5) * 2;
}

// ---------- WIND ----------
async function fetchWind() {
  try {
    const res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true"
    );

    const data = await res.json();

    return {
      dir: data.current_weather.winddirection,
      spd: data.current_weather.windspeed * 0.54,
      label: "LIVE WIND"
    };

  } catch {
    return {
      dir: 220,
      spd: 12,
      label: "DEFAULT WIND"
    };
  }
}

// ---------- MAIN ----------
async function runModel() {

  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  let windDirInput = document.getElementById("windDir").value;
  let windSpeedInput = document.getElementById("windSpeed").value;

  windDirInput = windDirInput ? parseFloat(windDirInput) : null;
  windSpeedInput = windSpeedInput ? parseFloat(windSpeedInput) : null;

  let wind = (windDirInput && windSpeedInput)
    ? { dir: windDirInput, spd: windSpeedInput, label: "MANUAL" }
    : await fetchWind();

  let html = `
    <div class="header">
      ${wind.label}<br>
      ${date} ${time}<br>
      ${wind.dir.toFixed(0)}° @ ${wind.spd.toFixed(1)} kts
    </div>
  `;

  let mapHTML = "";

  segments.forEach((seg, i) => {

    const now = getCurrent(i, 0);
    const ebb = now < 0;
    const strength = Math.min(Math.abs(now) / 2, 1);

    let njWidth = 50;
    let nyWidth = 50;

    if (ebb) {
      njWidth = 50 + strength * 40;
      nyWidth = 100 - njWidth;
    } else {
      nyWidth = 50 + strength * 40;
      njWidth = 100 - nyWidth;
    }

    // ---------- MAP ----------
    mapHTML += `
      let direction = ebb ? "Ebb ↓ (southbound)" : "Flood ↑ (northbound)";
let favored = ebb ? "Favor NJ" : "Favor Manhattan";

mapHTML += `
  <div class="mapRow">
    <div><b>${seg.name}</b></div>

    <div>${direction}</div>

    <div class="river">
      <div class="nj" style="width:${njWidth}%">${njWidth > nyWidth ? "NJ" : ""}</div>
      <div class="ny" style="width:${nyWidth}%">${nyWidth > njWidth ? "MAN" : ""}</div>
    </div>

    <div class="labelRow">
      <span>NJ</span>
      <span>Manhattan</span>
    </div>

    <div><b>${favored}</b></div>
  </div>
`;
    // ---------- TACTICS ----------
    let tactical;

    if (seg.zone === "hudson") {

      if (ebb) tactical = "STAY NJ – ebb relief";
      else tactical = "STAY MANHATTAN – flood relief";

      if (Math.abs(now) < 0.5) tactical = "CROSS NOW";

    } else {

      if (ebb) tactical = "MID-CHANNEL FLOW";
      else tactical = "USE SHORE EDDIES";

      if (Math.abs(now) < 0.5) tactical = "DIRECT ROUTE";

    }

    // wind influence
    if (wind.dir > 40 && wind.dir < 120)
      tactical += " | EAST WIND: Manhattan pressure";

    if (wind.dir > 190 && wind.dir < 260)
      tactical += " | SW WIND: NJ pressure";

    if (wind.spd < 7)
      tactical += " | LIGHT AIR";

    html += `
      <div class="segment ${seg.zone === 'south' ? 'south' : ''}">
        <strong>${seg.name}</strong><br>
        Current: ${now.toFixed(1)} kts ${ebb ? "Ebb" : "Flood"}<br>
        <b>${tactical}</b>
      </div>
    `;
  });

  document.getElementById("map").innerHTML = mapHTML;
  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
