<!DOCTYPE html>
<html>
<head>
  <title>Hudson Race Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; padding: 15px; background: #f5f5f5; }
    h2 { text-align: center; }

    input, button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      margin: 6px 0;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .header {
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      color:white;
      text-align:center;
      background:#007bff;
    }

    .segment {
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background: #28a745;
      color: white;
    }

    .south { background:#17a2b8; }

    .mapRow { margin: 10px 0; }

    .river {
      display: flex;
      height: 20px;
      border-radius: 6px;
      overflow: hidden;
      background: #ddd;
    }

    .nj {
      background: #007bff;
      text-align: left;
      padding-left: 5px;
      font-size: 12px;
      color: white;
    }

    .ny {
      background: #ff4136;
      text-align: right;
      padding-right: 5px;
      font-size: 12px;
      color: white;
    }

    .small { font-size: 12px; }
  </style>
</head>

<body>

<h2>Hudson Race Flow</h2>

<input type="date" id="date">
<input type="time" id="time">

<input type="number" id="windDir" placeholder="Wind Direction (deg)">
<input type="number" id="windSpeed" placeholder="Wind Speed (knots)">

<button onclick="runModel()">Run Model</button>

<div id="map"></div>
<div id="output"></div>

<script>

window.onload = function() {
  const now = new Date();
  document.getElementById("date").value = now.toISOString().split("T")[0];
  document.getElementById("time").value = now.toTimeString().slice(0,5);
  runModel();
};

const segments = [
  { name: "Battery to Governors", zone: "south" },
  { name: "Governors to Red Hook", zone: "south" },
  { name: "Red Hook to Bay Ridge", zone: "south" },
  { name: "Bay Ridge to Verrazzano", zone: "south" },
  { name: "North Cove to Pier 25", zone: "hudson" },
  { name: "Pier 25 to Pier 40", zone: "hudson" },
  { name: "Pier 40 to Pier 66", zone: "hudson" },
  { name: "Pier 66 to Pier 79", zone: "hudson" },
  { name: "Pier 79 to GW Bridge", zone: "hudson" }
];

function getCurrent(i, t) {
  return Math.sin(i * 0.8 + t * 0.5) * 2;
}

async function fetchWind() {
  try {
    const res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true"
    );

    const data = await res.json();

    return {
      dir: data.current_weather.winddirection,
      spd: data.current_weather.windspeed * 0.54,
      label: "LIVE WIND"
    };

  } catch {
    return {
      dir: 220,
      spd: 12,
      label: "DEFAULT WIND"
    };
  }
}

async function runModel() {

  let windDirInput = document.getElementById("windDir").value;
  let windSpeedInput = document.getElementById("windSpeed").value;

  windDirInput = windDirInput ? parseFloat(windDirInput) : null;
  windSpeedInput = windSpeedInput ? parseFloat(windSpeedInput) : null;

  let wind = (windDirInput && windSpeedInput)
    ? { dir: windDirInput, spd: windSpeedInput, label: "MANUAL" }
    : await fetchWind();

  let mapHTML = "";
  let html = `
    <div class="header">
      ${wind.label}<br>
      ${wind.dir.toFixed(0)} deg @ ${wind.spd.toFixed(1)} kts
    </div>
  `;

  segments.forEach((seg, i) => {

    const current = getCurrent(i, 0);
    const ebb = current < 0;
    const strength = Math.min(Math.abs(current)/2,1);

    let njWidth = 50;
    let nyWidth = 50;

    if (ebb) {
      njWidth = 50 + strength*40;
      nyWidth = 100 - njWidth;
    } else {
      nyWidth = 50 + strength*40;
      njWidth = 100 - nyWidth;
    }

    let direction = ebb ? "Ebb (south)" : "Flood (north)";
    let favored = ebb ? "Favor NJ" : "Favor Manhattan";

    mapHTML += `
      <div class="mapRow">
        <div><b>${seg.name}</b></div>
        <div class="small">${direction}</div>

        <div class="river">
          <div class="nj" style="width:${njWidth}%">${njWidth>nyWidth?"NJ":""}</div>
          <div class="ny" style="width:${nyWidth}%">${nyWidth>njWidth?"MAN":""}</div>
        </div>

        <div class="small"><b>${favored}</b></div>
      </div>
    `;

    let tactical;

    if (seg.zone === "hudson") {
      tactical = ebb ? "Stay NJ" : "Stay Manhattan";
      if (Math.abs(current)<0.5) tactical="Cross now";
    } else {
      tactical = ebb ? "Mid-channel" : "Use edges";
    }

    html += `
      <div class="segment ${seg.zone==="south"?"south":""}">
        <b>${seg.name}</b><br>
        Current: ${current.toFixed(1)} kts (${direction})<br>
        <b>${tactical}</b>
      </div>
    `;
  });

  document.getElementById("map").innerHTML = mapHTML;
  document.getElementById("output").innerHTML = html;
}
<a href="map.html">
  <button>Open Map View</button>
</a>
</script>

</body>
</html>
