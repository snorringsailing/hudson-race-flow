<!DOCTYPE html>
<html>
<head>
  <title>Hudson Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; }
    #map { height:100vh; }

    .backBtn {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1000;
    }
  </style>
</head>

<body>

<div class="backBtn">
  <a href="/hudson-race-flow/index.html">
    <button>← Model</button>
  </a>
</div>

<div id="map"></div>

<script>

// ---------- MAP BASE ----------
const map = L.map('map').setView([40.70, -74.02], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

// ---------- COMPASS ----------
function getCompass(dir) {
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(dir / 22.5) % 16];
}

// ---------- SAFE WIND ----------
async function fetchWind() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true");
    const d = await res.json();
    return {
      dir: d.current_weather.winddirection,
      spd: d.current_weather.windspeed * 0.54
    };
  } catch {
    return { dir: 220, spd: 10 };
  }
}

// ---------- SAFE CURRENT ----------
async function getCurrent() {
  try {
    const url = "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=currents_predictions&station=8518750&units=english&time_zone=gmt&format=json";
    const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

    const res = await fetch(proxy);
    const d = await res.json();

    return parseFloat(d.data[0].v);
  } catch {
    return Math.sin(Date.now()/10000000) * 1.2;
  }
}

// ---------- SEGMENTS ----------
const segments = [
  { name:"Verrazzano", coords:[40.606,-74.045] },
  { name:"Bay Ridge", coords:[40.620,-74.030] },
  { name:"Red Hook", coords:[40.660,-74.015] },
  { name:"Governors", coords:[40.695,-74.020] },
  { name:"Battery", coords:[40.705,-74.015] },
  { name:"Pier 40", coords:[40.730,-74.010] },
  { name:"Midtown", coords:[40.760,-74.000] }
];

// ---------- DRAW ----------
async function drawMap() {

  const wind = await fetchWind();
  const base = await getCurrent();

  segments.forEach((seg, i) => {

    const current = base * (1 + (i - 3)*0.05);
    const ebb = current < 0;

    let side = ebb ? "NJ" : "MAN";

    if (wind.spd < 7) {
      if (wind.dir > 45 && wind.dir < 135) side = "MAN";
      if (wind.dir > 225 && wind.dir < 315) side = "NJ";
    }

    let lat = seg.coords[0];
    let lon = seg.coords[1];

    if (side === "NJ") lon -= 0.01;
    if (side === "MAN") lon += 0.01;

    const icon = L.divIcon({
      html:`<div style="font-weight:bold;color:${side==="NJ"?"blue":"red"}">
      ${ebb?"↓":"↑"}<br>${side}</div>`
    });

    L.marker([lat,lon],{icon})
      .addTo(map)
      .bindPopup(`
        <b>${seg.name}</b><br>
        Wind: ${getCompass(wind.dir)} (${wind.dir.toFixed(0)}°) @ ${wind.spd.toFixed(1)} kts<br>
        Current: ${current.toFixed(1)} kts (${ebb?"Ebb":"Flood"})
      `);
  });

}

drawMap();

</script>

</body>
</html>
