<!DOCTYPE html>
<html>
<head>
  <title>Hudson Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; }
    #map { height:100vh; }

    .backBtn {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1000;
    }
  </style>
</head>

<body>

<div class="backBtn">
  <a href="/hudson-race-flow/index.html">
    <button>← Model</button>
  </a>
</div>

<div id="map"></div>

<script>

// ---------- MAP ----------
const map = L.map('map').setView([40.70, -74.02], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

// ---------- COMPASS ----------
function getCompass(dir) {
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(dir / 22.5) % 16];
}

// ---------- WIND ----------
async function fetchWind() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true");
    const d = await res.json();

    return {
      dir: d.current_weather.winddirection,
      spd: d.current_weather.windspeed * 0.54
    };
  } catch {
    return { dir: 220, spd: 10 };
  }
}

// ---------- CURRENT ----------
async function getCurrent() {
  try {
    const url = "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=currents_predictions&station=8518750&units=english&time_zone=gmt&format=json";
    const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

    const res = await fetch(proxy);
    const d = await res.json();

    return parseFloat(d.data[0].v);
  } catch {
    return Math.sin(Date.now()/10000000) * 1.2;
  }
}

// ---------- SEGMENTS (SAFE WATER LANES) ----------
const segments = [
  { name:"Verrazzano", nj:[40.606,-74.055], mid:[40.606,-74.045], man:[40.606,-74.035] },
  { name:"Bay Ridge", nj:[40.620,-74.040], mid:[40.620,-74.030], man:[40.620,-74.020] },
  { name:"Red Hook", nj:[40.660,-74.025], mid:[40.660,-74.015], man:[40.660,-74.005] },
  { name:"Governors", nj:[40.695,-74.030], mid:[40.695,-74.020], man:[40.695,-74.010] },
  { name:"Battery", nj:[40.705,-74.025], mid:[40.705,-74.015], man:[40.705,-74.005] },
  { name:"Pier 40", nj:[40.730,-74.020], mid:[40.730,-74.010], man:[40.730,-74.000] },
  { name:"Midtown", nj:[40.760,-74.015], mid:[40.760,-74.005], man:[40.760,-73.995] }
];

// ---------- DRAW ----------
async function drawMap() {

  const hours = [0,1,2,3,4];

  // FAST render first
  segments.forEach(seg => {
    L.marker(seg.mid).addTo(map);
  });

  // load real data
  const wind = await fetchWind();
  const base = await getCurrent();

  map.eachLayer(layer => {
    if (layer instanceof L.Marker) map.removeLayer(layer);
  });

  segments.forEach((seg, i) => {

    let timeline = [];
    hours.forEach(h => {
      timeline.push(base * Math.cos(h * 0.8));
    });

    const current = timeline[0];
    const ebb = current < 0;

    // ---------- SIDE ----------
    let side = ebb ? "NJ" : "MAN";

    if (wind.spd < 7) {
      if (wind.dir > 45 && wind.dir < 135) side = "MAN";
      else if (wind.dir > 225 && wind.dir < 315) side = "NJ";
    }

    // ---------- POSITION ----------
    let pos = seg.mid;
    if (side === "NJ") pos = seg.nj;
    if (side === "MAN") pos = seg.man;

    // ---------- ICON ----------
    const color = side === "NJ" ? "blue" : "red";
    const arrow = ebb ? "↓" : "↑";

    const icon = L.divIcon({
      html: `<div style="font-weight:bold;color:${color};text-align:center">
        ${arrow}<br>${side}
      </div>`
    });

    // ---------- TURN ----------
    let turn = "";
    for (let h=1; h<hours.length; h++) {
      if (timeline[h-1]*timeline[h] < 0) {
        turn = `TURN ~ +${h}h<br>`;
      }
    }

    // ---------- TREND ----------
    let trend = "";
    hours.forEach((h, idx) => {
      trend += `+${h}h: ${timeline[idx].toFixed(1)} kts<br>`;
    });

    // ---------- MARKER ----------
    L.marker(pos, { icon })
      .addTo(map)
      .bindPopup(`
        <b>${seg.name}</b><br><br>

        Wind: ${getCompass(wind.dir)} (${wind.dir.toFixed(0)}°) @ ${wind.spd.toFixed(1)} kts<br>
        Current: ${current.toFixed(1)} kts (${ebb ? "Ebb" : "Flood"})<br><br>

        ${turn}

        <b>Trend</b><br>
        ${trend}
      `);
  });

}

drawMap();

</script>

</body>
</html>
