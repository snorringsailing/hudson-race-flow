<!DOCTYPE html>
<html>
<head>
  <title>Hudson Race Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial; }
    #map { height: 100vh; }
    .legend {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="legend">
  <b>Current Strength</b><br>
  Blue = Favor NJ<br>
  Red = Favor Manhattan
</div>

<script>

// ---------- MAP ----------
const map = L.map('map').setView([40.66, -74.02], 12);
// basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// ---------- SEGMENTS (approx positions) ----------
const segments = [
  { name: "Battery", coords: [40.70, -74.01] },
  { name: "Governors Island", coords: [40.69, -74.02] },
  { name: "Buttermilk Channel", coords: [40.68, -74.00] },
  { name: "Red Hook", coords: [40.67, -74.01] },
  { name: "Upper Bay East", coords: [40.65, -74.00] },
  { name: "Bay Ridge", coords: [40.63, -74.03] },
  { name: "Verrazzano Narrows", coords: [40.61, -74.05] }
];

// ---------- CURRENT MODEL ----------
function getCurrent(i) {
  return Math.sin(i * 0.8) * 2;
}

// ---------- DRAW ----------
async function getWind() {
  try {
    const res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=40.68&longitude=-74.06&current_weather=true"
    );
    const data = await res.json();
    return {
      dir: data.current_weather.winddirection,
      spd: data.current_weather.windspeed * 0.54
    };
  } catch {
    return { dir: 220, spd: 10 };
  }
}

function windFavor(dir) {
  // east winds favor Manhattan, west winds favor NJ
  if (dir > 45 && dir < 135) return "MAN";
  if (dir > 225 && dir < 315) return "NJ";
  return "NEUTRAL";
}

async function drawMap() {

  const wind = await getWind();

  segments.forEach((seg, i) => {

    const current = getCurrent(i);
    const ebb = current < 0;

    const currentStrength = Math.abs(current);

    // current-based side
    let currentSide = ebb ? "NJ" : "MAN";

    // wind-based side
    let windSide = windFavor(wind.dir);

    let finalSide;

    // ---------- COMBINE ----------
    if (wind.spd < 7) {
      finalSide = windSide; // light air → wind dominates
    }
    else if (currentStrength > 1) {
      finalSide = currentSide; // strong current dominates
    }
    else {
      finalSide = windSide !== "NEUTRAL" ? windSide : currentSide;
    }

    // ---------- VISUAL ----------
    let color = "gray";
    if (finalSide === "NJ") color = "blue";
    if (finalSide === "MAN") color = "red";

    const arrow = ebb ? "↓" : "↑";

    const icon = L.divIcon({
      className: '',
      html: `
        <div style="
          color:${color};
          font-weight:bold;
          text-align:center;
          font-size:16px;
        ">
          ${arrow}<br>${finalSide}
        </div>
      `,
      iconSize: [30, 30]
    });

    L.marker(seg.coords, { icon: icon })
      .addTo(map)
      .bindPopup(`
        <b>${seg.name}</b><br>
        Wind: ${wind.dir.toFixed(0)}° @ ${wind.spd.toFixed(1)} kts<br>
        Current: ${current.toFixed(1)} kts (${ebb ? "Ebb" : "Flood"})<br>
        <b>Best Side: ${finalSide}</b>
      `);

  });
}

// run it
drawMap();

// centerline
L.polyline(segments.map(s => s.coords), {
  color: "black",
  weight: 2
}).addTo(map);

</script>

</body>
</html>
